<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concert Date Invite</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b1220,#111827);
    font-family:sans-serif;
    color:white;
    overflow:hidden;
}

/* subtle floating glow particles (NOT cringe hearts) */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(34,197,94,0.25);
    animation:float 10s linear infinite;
}

@keyframes float{
    from{ transform:translateY(100vh); }
    to{ transform:translateY(-120vh); }
}

.card{
    width:min(90%,520px);
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h1{
    font-size:20px;
    margin-bottom:10px;
}

.details{
    font-size:13px;
    opacity:.7;
    margin-bottom:25px;
}

#emoji{
    font-size:55px;
    margin-bottom:20px;
    transition:.2s;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    position:relative;
}

button{
    border:none;
    padding:12px 26px;
    border-radius:999px;
    font-size:15px;
    cursor:pointer;
}

.yes{
    background:#22c55e;
    color:white;
}

.no{
    background:#e5e7eb;
    color:#111;
    position:relative;
}

/* spotify mini bar */
.player{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:min(92%,420px);
    background:#0b1220;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:15px;
    padding:12px;
    display:flex;
    gap:12px;
    align-items:center;
}

.album{
    width:38px;
    height:38px;
    border-radius:8px;
    background:linear-gradient(135deg,#22c55e,#06b6d4);
}

.track-title{
    font-size:13px;
}

.artist{
    font-size:11px;
    opacity:.6;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

    <h1>Concert Date Invite 🎶</h1>

    <div class="details">
        Wave to Earth – The Pieces Tour<br>
        Nov 15, 2026 • MOA Arena
    </div>

    <div id="emoji">🎧</div>

    <p style="opacity:.8;font-size:14px;">
        Do you want to go with me?
    </p>

    <div class="buttons">
        <button class="yes" id="yesBtn" onclick="yesClick()">YES</button>
        <button class="no" id="noBtn">NO</button>
    </div>

</div>

<!-- spotify bar -->
<div class="player">
    <div class="album"></div>
    <div>
        <div class="track-title">Wave to Earth – Bad</div>
        <div class="artist">now playing</div>
    </div>
</div>

<!-- audio -->
<audio id="bgm" loop>
    <source src="bad.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<script>

let attempts = 0;
let audioStarted = false;
let lastMove = 0;
    
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const emoji = document.getElementById("emoji");
const audio = document.getElementById("bgm");

const moods = ["🎧","😐","😬","😳","😭","💀","🌙"];

noBtn.addEventListener("click", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo(){

    const now = Date.now();

    if(now - lastMove < 200) return; // ✅ limiter
    lastMove = now;
    
    attempts++;

    emoji.textContent = moods[Math.floor(Math.random()*moods.length)];

    // ✅ NEW: shrinking NO button
    const shrink = Math.max(0.3, 1 - attempts * 0.05);
    noBtn.style.transform = `scale(${shrink})`;

    // unlock music on interaction (browser safe)
    if(!audioStarted){
        audio.play().catch(()=>{});
        audioStarted = true;
    }

    // =========================
    // FIRST PHASE (10 clicks)
    // =========================
    if(attempts < 10){

       // ✅ EXPONENTIAL YES growth
        const scale = Math.min(5, Math.pow(1.15, attempts));
        yesBtn.style.transform = `scale(${1 + attempts*0.05})`;

        const rect = noBtn.getBoundingClientRect();

        noBtn.style.position = "fixed";
        noBtn.style.left = rect.left + (Math.random()-0.5)*60 + "px";
        noBtn.style.top = rect.top + (Math.random()-0.5)*60 + "px";

        return;
    }

    // =========================
    // ESCAPE MODE AFTER 10
    // =========================
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";

    // ✅ EXPONENTIAL (bigger cap)
    const scale = Math.min(6, Math.pow(1.15, attempts));
    yesBtn.style.transform =
        `scale(${Math.min(1.8, 1 + attempts*0.07)})`;

    if(attempts === 12)
        document.querySelector("p").innerText = "this is literally a concert date.";

    if(attempts === 18)
        document.querySelector("p").innerText = "music is already playing…";

    if(attempts === 25)
        noBtn.innerText = "NO";

    if(attempts === 30)
        noBtn.remove();
}

// subtle particles
for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(8+Math.random()*10)+"s";
    document.body.appendChild(p);
}

function yesClick(){

    audio.play().catch(()=>{});

    document.body.innerHTML=`
    <div class="card">
        <h1>see you at MOA Arena 🎶</h1>
        <div class="details">
            Wave to Earth – The Pieces Tour<br>
            Nov 15, 2026
        </div>
        <div style="font-size:50px;margin-top:20px;">✨🎧✨</div>
    </div>
    <canvas id="confetti"></canvas>
    `;

    launchConfetti();
}

function launchConfetti(){

    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    const pieces=[];

    for(let i=0;i<160;i++){
        pieces.push({
            x:canvas.width/2,
            y:canvas.height/2,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            size:Math.random()*6+2,
            color:`hsl(${Math.random()*360},80%,60%)`
        });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach(p=>{
            p.x+=p.dx;
            p.y+=p.dy;
            p.dy+=0.05;

            ctx.fillStyle=p.color;
            ctx.fillRect(p.x,p.y,p.size,p.size);
        });

        requestAnimationFrame(animate);
    }

    animate();
}

</script>

</body>
</html>
